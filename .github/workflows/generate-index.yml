name: Generate index and sitemap

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build IndexGenerator
        run: dotnet build IndexGenerator.csproj --configuration Release

      - name: Run IndexGenerator
        run: dotnet run --project IndexGenerator.csproj --configuration Release

      - name: Commit and push problems.json and sitemap.xml if changed
        run: |
          if git status --porcelain | grep -qE 'problems\.json|sitemap\.xml'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add problems.json sitemap.xml
            git commit -m "chore: auto-generate problems manifest and sitemap"
            git push origin main
          else
            echo "No changes to problems.json or sitemap.xml; nothing to commit."
          fi

