<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer: Deck Revealed Increasing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.5) translateY(-20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.3s ease-out forwards;
        }
        @keyframes slideRight {
            0% { transform: translateX(30px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-slide {
            animation: slideRight 0.3s ease-out forwards;
        }
        
        @keyframes dropFromSource {
            0% { transform: translateY(-80px) scale(1.1); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-drop-source {
            animation: dropFromSource 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes swoopFromRight {
            0% { transform: translate(100px, 40px) scale(0.8) rotate(15deg); opacity: 0; }
            50% { transform: translate(40px, -10px) scale(1.05) rotate(-5deg); opacity: 0.8; }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-swoop-right {
            animation: swoopFromRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes shiftRight {
            0% { transform: translateX(-35px); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 1; }
        }
        .animate-shift {
            animation: shiftRight 0.4s ease-out forwards;
        }

        /* Custom scrollbars */
        .custom-scroll::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #1e293b; 
            border-radius: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        .light-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .light-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
        }

        /* Card Styles */
        .playing-card {
            width: 3.5rem;
            height: 5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 2px solid #e2e8f0;
            background-color: white;
            color: #1e293b;
            flex-shrink: 0;
            position: relative;
        }
        .playing-card::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px dashed #cbd5e1;
            border-radius: 0.25rem;
            pointer-events: none;
        }
        .mini-card {
            width: 2.75rem;
            height: 3.75rem;
            font-size: 1.1rem;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-teal-800 text-white p-4 sm:px-8 shadow-md border-b-4 border-teal-600">
        <div class="w-full flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2">
            <h1 class="text-xl sm:text-2xl font-bold flex items-center gap-3">
                <svg class="w-6 h-6 text-teal-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                Deck Revealed Increasing (Step History Stack)
            </h1>
            <div class="text-xs sm:text-sm bg-teal-900 px-3 py-1 rounded-full border border-teal-500 shadow-inner">Interactive Debugger</div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="mainContainer" class="flex-grow p-4 sm:p-6 w-full flex flex-col lg:flex-row gap-4 relative">
        
        <!-- Left Column: Controls & Visuals -->
        <div id="leftPane" class="w-full lg:w-[55%] min-w-[300px] flex flex-col gap-4">
            
            <!-- Setup Panel -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm uppercase tracking-wide text-slate-500 font-bold">1. Configure Deck</h2>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 mb-3">
                    <div class="w-full sm:w-1/3">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Presets</label>
                        <select id="presetSelect" onchange="loadPreset()" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:outline-none text-sm bg-slate-50 font-medium text-slate-700">
                            <option value="[17,13,11,2,3,5,7]">LeetCode Example</option>
                            <option value="[1,1000]">Small Deck</option>
                            <option value="[1,2,3,4,5,6,7,8]">Sorted Deck</option>
                            <option value="[21, 14, 7, 35, 28]">Random Deck</option>
                        </select>
                    </div>
                    
                    <div class="flex-grow w-full">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">Input Deck Array</label>
                        <div class="flex gap-2">
                            <input type="text" id="deckInput" value="[17,13,11,2,3,5,7]" class="flex-grow px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:outline-none font-mono text-sm text-slate-600 bg-slate-50">
                            <button id="loadBtn" onclick="loadSimulation()" class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-2 rounded-lg font-bold transition-colors shadow-sm whitespace-nowrap">
                                Load Run
                            </button>
                        </div>
                    </div>
                </div>

                <div id="errorMsg" class="text-rose-600 bg-rose-50 border border-rose-200 p-3 rounded-lg text-sm mt-3 hidden font-mono"></div>
            </div>

            <!-- Visualization Panel -->
            <div class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-slate-200 flex-grow flex flex-col">
                <div class="flex flex-col lg:flex-row justify-between items-start mb-4 gap-4">
                    <h2 class="text-sm uppercase tracking-wide text-slate-500 font-bold shrink-0">2. Memory State</h2>
                    
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-slate-400 whitespace-nowrap" id="stepCounter">0/0</span>
                        <div id="phaseBadge" class="px-3 py-1 text-xs font-bold uppercase rounded-md whitespace-nowrap bg-slate-200 text-slate-600">IDLE</div>
                    </div>
                </div>

                <!-- Canvas Area -->
                <div class="relative flex-grow min-h-[450px] max-h-[600px] bg-[#0f172a] rounded-xl border-4 border-slate-700 flex flex-col overflow-hidden shadow-inner">
                    
                    <!-- Source Array Area (Fixed at top) -->
                    <div class="p-4 bg-slate-800 border-b-2 border-slate-600 shadow-md z-20">
                        <div class="flex justify-between items-end mb-2">
                            <h3 class="text-teal-400 text-xs font-bold uppercase tracking-widest">Source Array (rev)</h3>
                            <span class="text-slate-400 text-[10px] uppercase font-mono tracking-wider flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-teal-500 shadow-[0_0_8px_rgba(20,184,166,1)]"></span> Active Element
                            </span>
                        </div>
                        <div id="sourceContainer" class="flex gap-2 overflow-x-auto light-scroll custom-scroll pb-2 min-h-[4.5rem] pt-2">
                            <!-- Source cards injected here -->
                        </div>
                    </div>

                    <!-- History Stack Area (Scrollable) -->
                    <div class="flex-grow overflow-y-auto custom-scroll p-4 flex flex-col gap-3 relative z-10 scroll-smooth" id="historyContainer">
                        <!-- History rows injected here -->
                    </div>
                </div>

                <div class="mt-4 p-3 bg-slate-50 text-slate-700 rounded-lg text-sm border border-slate-200 font-medium shadow-inner">
                    <span class="font-bold text-teal-700 uppercase text-xs tracking-wider mr-2">Action:</span> 
                    <span id="stepMessage" class="font-mono">Click 'Load Run' and then 'PLAY' to start visualization.</span>
                </div>
            </div>

            <!-- Playback Controls -->
            <div class="bg-white p-4 sm:p-5 rounded-xl shadow-sm border border-slate-200">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-2 w-full sm:w-auto justify-center">
                        <button onclick="prevStep()" class="p-2.5 bg-slate-100 hover:bg-slate-200 rounded-lg transition text-slate-700" title="Previous Step">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="playBtn" onclick="togglePlay()" class="px-6 py-2.5 bg-teal-700 hover:bg-teal-800 text-white rounded-lg transition font-bold w-32 text-center shadow-sm tracking-wide">
                            PLAY
                        </button>
                        <button onclick="nextStep()" class="p-2.5 bg-slate-100 hover:bg-slate-200 rounded-lg transition text-slate-700" title="Next Step">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                    
                    <div class="flex-grow flex items-center gap-4 px-2 sm:px-4 w-full">
                        <input type="range" id="stepSlider" min="0" max="0" value="0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-teal-600" oninput="goToStep(this.value)">
                    </div>

                    <div class="flex items-center gap-2 w-full sm:w-auto justify-end text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <input type="range" id="speedSlider" min="200" max="2000" value="800" dir="rtl" class="w-20 sm:w-24 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-500" title="Adjust Playback Speed">
                    </div>
                </div>
            </div>

        </div>

        <!-- Draggable Resizer (Desktop Only) -->
        <div id="dragResizer" class="hidden lg:flex w-4 cursor-col-resize items-center justify-center -mx-2 z-20 group select-none">
            <div class="h-24 w-1.5 bg-slate-200 group-hover:bg-teal-500 rounded-full transition-colors"></div>
        </div>

        <!-- Right Column: Code Viewer / Editor -->
        <div id="rightPane" class="w-full lg:flex-1 min-w-[300px] bg-[#1e1e1e] rounded-xl shadow-lg border border-slate-800 flex flex-col overflow-hidden relative">
            <div class="bg-[#2d2d2d] px-4 py-3 border-b border-slate-700 flex justify-between items-center z-10">
                <h2 class="text-slate-300 font-semibold text-xs tracking-wider uppercase font-mono">Solution.js (Algorithm)</h2>
                <div class="flex items-center gap-3">
                    <button id="editCodeBtn" onclick="toggleEditMode()" class="px-3 py-1.5 bg-slate-600 hover:bg-slate-500 text-slate-100 text-xs font-bold rounded transition-colors shadow-sm border border-slate-500">
                        EDIT CODE
                    </button>
                    <div class="flex gap-1.5 hidden sm:flex">
                        <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                        <div class="w-3 h-3 rounded-full bg-amber-500"></div>
                        <div class="w-3 h-3 rounded-full bg-teal-500"></div>
                    </div>
                </div>
            </div>
            <div class="relative flex-grow h-[500px] lg:h-auto">
                <div class="absolute inset-0 overflow-y-auto custom-scroll p-4 pb-12" id="codeContainer">
                    <pre class="font-mono text-[13px] sm:text-sm leading-relaxed text-[#d4d4d4] w-full" id="codeBlock"></pre>
                </div>
                <textarea id="codeEditor" class="hidden absolute inset-0 w-full h-full bg-[#1e1e1e] text-[#4ec9b0] font-mono text-[13px] sm:text-sm leading-relaxed focus:outline-none resize-none border-none p-4 custom-scroll pb-12" spellcheck="false" style="tab-size: 4;"></textarea>
            </div>
        </div>

    </main>

    <script>
        // --- Editable Code State ---
        // JS equivalent of the provided C# LinkedList algorithm
        let currentCodeText = `function deckRevealedIncreasing(deck) {
    let rev = [...deck].sort((a, b) => b - a);
    let list = [];
    let i = 0;
    
    // 1. Add largest element
    list.unshift(rev[i]);
    tracer.insert([...list], [...rev], i, rev[i]);

    // 2. Process remaining elements
    while (++i < rev.length) {
        
        // a. Rotate last element to front
        let last = list.pop();
        list.unshift(last);
        tracer.rotate([...list], [...rev], i, last);
        
        // b. Insert next largest element
        list.unshift(rev[i]);
        tracer.insert([...list], [...rev], i, rev[i]);
    }

    return list;
}`;

        let isEditMode = false;

        document.getElementById('codeEditor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        function toggleEditMode() {
            const btn = document.getElementById('editCodeBtn');
            const pre = document.getElementById('codeContainer');
            const editor = document.getElementById('codeEditor');
            const loadBtn = document.getElementById('loadBtn');

            if (!isEditMode) {
                isEditMode = true;
                btn.innerText = "SAVE & RUN";
                btn.classList.replace('bg-slate-600', 'bg-teal-600');
                btn.classList.replace('border-slate-500', 'border-teal-500');
                btn.classList.replace('hover:bg-slate-500', 'hover:bg-teal-500');
                
                editor.value = currentCodeText;
                pre.classList.add('hidden');
                editor.classList.remove('hidden');
                
                loadBtn.disabled = true;
                loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                if(isPlaying) togglePlay();
            } else {
                isEditMode = false;
                btn.innerText = "EDIT CODE";
                btn.classList.replace('bg-teal-600', 'bg-slate-600');
                btn.classList.replace('border-teal-500', 'border-slate-500');
                btn.classList.replace('hover:bg-teal-500', 'hover:bg-slate-500');
                
                currentCodeText = editor.value;
                editor.classList.add('hidden');
                pre.classList.remove('hidden');
                
                renderCodeView(currentCodeText);
                
                loadBtn.disabled = false;
                loadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                
                loadSimulation();
            }
        }

        function renderCodeView(code) {
            const codeLines = code.split('\n');
            const codeBlock = document.getElementById('codeBlock');
            
            codeBlock.innerHTML = codeLines.map((line, index) => {
                const lineNum = index + 1;
                let formattedLine = line.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                formattedLine = formattedLine.replace(/\b(function|return|let|const|var|while|for|if|else)\b/g, '<span class="text-[#c586c0]">$1</span>');
                formattedLine = formattedLine.replace(/\b(sort|unshift|pop|push|rotate|insert)\b/g, '<span class="text-[#dcdcaa]">$1</span>');
                formattedLine = formattedLine.replace(/\b(deckRevealedIncreasing)\b/g, '<span class="text-[#dcdcaa] font-bold">$1</span>');
                formattedLine = formattedLine.replace(/(\/\/.+)/g, '<span class="text-[#6a9955]">$1</span>');
                formattedLine = formattedLine.replace(/\b(tracer|deck|rev|list|i|last)\b/g, '<span class="text-[#9cdcfe]">$1</span>');

                return `<div id="line-${lineNum}" class="px-2 py-0.5 border-l-4 border-transparent flex items-start relative transition-colors duration-200">
                    <span id="caret-${lineNum}" class="absolute left-0 top-1 -ml-[3px] text-yellow-400 opacity-0 transition-opacity duration-200 text-[10px]">▶</span>
                    <span class="text-[#858585] w-8 inline-block select-none ml-2 text-right pr-3 shrink-0">${lineNum}</span>
                    <span class="whitespace-pre-wrap break-all">${formattedLine}</span>
                </div>`;
            }).join('');
        }

        // --- Core Application State & Algorithm Engine ---
        let steps = [];
        let currentStepIndex = 0;
        let isPlaying = false;
        let playInterval;

        function runCustomCode(code, inputDeck) {
            let generatedSteps = [];

            // Heuristic to map execution phases to line numbers
            function getLineNumber(keyword) {
                const lines = code.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes(keyword)) return i + 1;
                }
                return -1;
            }
            
            const tracer = {
                rotate: (listState, revState, sourceIndex, rotatedVal) => {
                    generatedSteps.push({
                        list: listState,
                        rev: revState,
                        sourceIndex: sourceIndex,
                        inserted: null,
                        rotated: rotatedVal,
                        phase: 'ROTATE',
                        msg: `Rotated ${rotatedVal} from back to front.`,
                        line: getLineNumber('tracer.rotate')
                    });
                },
                insert: (listState, revState, sourceIndex, insertedVal) => {
                    generatedSteps.push({
                        list: listState,
                        rev: revState,
                        sourceIndex: sourceIndex,
                        inserted: insertedVal,
                        rotated: null,
                        phase: sourceIndex === 0 ? 'INIT' : 'INSERT',
                        msg: `Picked ${insertedVal} from source and inserted at front.`,
                        line: getLineNumber('tracer.insert')
                    });
                }
            };

            try {
                // Execute user code
                const executableCode = code + '\nif (typeof deckRevealedIncreasing === "function") return deckRevealedIncreasing(deck); return [];';
                const dynamicFunction = new Function('deck', 'tracer', executableCode);
                dynamicFunction([...inputDeck], tracer);

                return { steps: generatedSteps, error: null };
            } catch (err) {
                console.error(err);
                return { steps: [], error: err.message };
            }
        }

        function loadPreset() {
            try {
                const presetVal = document.getElementById('presetSelect').value;
                document.getElementById('deckInput').value = presetVal;
                loadSimulation();
            } catch (e) { console.error("Preset load failed", e); }
        }

        function loadSimulation() {
            if (isPlaying) togglePlay();

            const deckStr = document.getElementById('deckInput').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const deckArr = JSON.parse(deckStr);

                if (!Array.isArray(deckArr) || deckArr.some(isNaN)) {
                    throw new Error("Input must be a valid JSON array of numbers.");
                }
                
                const result = runCustomCode(currentCodeText, deckArr);
                
                if (result.error) {
                    errorMsg.innerText = "Execution Error:\n" + result.error;
                    errorMsg.classList.remove('hidden');
                    steps = [];
                    return;
                }

                errorMsg.classList.add('hidden');
                steps = result.steps;
                
                const slider = document.getElementById('stepSlider');
                slider.max = steps.length > 0 ? steps.length - 1 : 0;
                slider.value = 0;
                
                currentStepIndex = 0;
                renderStep(0);
                
            } catch (e) {
                errorMsg.innerText = "Input Error: Ensure deck is a valid JSON array of integers (e.g., [17,13,11,2,3,5,7]).";
                errorMsg.classList.remove('hidden');
            }
        }

        // --- Rendering Engine ---
        function renderStep(index) {
            if (steps.length === 0) return;
            const step = steps[index];
            
            // UI Updates
            document.getElementById('stepCounter').innerText = `${index + 1}/${steps.length}`;
            document.getElementById('stepSlider').value = index;
            document.getElementById('stepMessage').innerHTML = step.msg;

            const phaseBadge = document.getElementById('phaseBadge');
            phaseBadge.innerText = step.phase;
            phaseBadge.className = 'px-3 py-1 text-xs font-bold uppercase rounded-md whitespace-nowrap shadow-sm border ';
            
            switch (step.phase) {
                case 'INIT':   phaseBadge.className += 'bg-slate-700 text-slate-100 border-slate-600'; break;
                case 'ROTATE': phaseBadge.className += 'bg-amber-100 text-amber-800 border-amber-300 ring-1 ring-amber-500'; break;
                case 'INSERT': phaseBadge.className += 'bg-teal-100 text-teal-800 border-teal-300 ring-1 ring-teal-500'; break;
                default:       phaseBadge.className += 'bg-slate-100 text-slate-500 border-slate-200';
            }

            // Code Line Highlighting
            document.querySelectorAll('#codeBlock > div').forEach(div => {
                div.classList.remove('bg-[#062f4a]', 'border-yellow-400');
                div.classList.add('border-transparent');
            });
            document.querySelectorAll('[id^="caret-"]').forEach(caret => {
                caret.classList.replace('opacity-100', 'opacity-0');
            });

            if (step.line > 0) {
                const activeLineEl = document.getElementById(`line-${step.line}`);
                const activeCaretEl = document.getElementById(`caret-${step.line}`);
                if (activeLineEl) {
                    activeLineEl.classList.remove('border-transparent');
                    activeLineEl.classList.add('bg-[#062f4a]', 'border-yellow-400');
                    if (activeCaretEl) activeCaretEl.classList.replace('opacity-0', 'opacity-100');
                    
                    const container = document.getElementById('codeContainer');
                    const offset = activeLineEl.offsetTop - (container.clientHeight / 2) + (activeLineEl.clientHeight / 2);
                    container.scrollTo({ top: offset, behavior: 'smooth' });
                }
            }

            // Render Source Container
            const sourceContainer = document.getElementById('sourceContainer');
            sourceContainer.innerHTML = '';
            
            if (step.rev) {
                step.rev.forEach((val, idx) => {
                    const card = document.createElement('div');
                    card.className = 'playing-card mini-card card-transition';
                    card.innerText = val;
                    
                    if (idx < step.sourceIndex) {
                        // Already used
                        card.classList.add('opacity-30', 'bg-slate-300', 'text-slate-500', 'scale-90', 'border-slate-400');
                    } else if (idx === step.sourceIndex && (step.phase === 'INSERT' || step.phase === 'INIT')) {
                        // Currently picked! Highlight it!
                        card.classList.add('border-teal-400', 'bg-teal-100', 'text-teal-900', 'ring-2', 'ring-teal-400', 'ring-offset-2', 'ring-offset-slate-800', '-translate-y-2');
                    } else {
                        // Waiting to be used
                        card.classList.add('bg-white', 'text-slate-700', 'border-slate-300');
                    }
                    sourceContainer.appendChild(card);
                });
            }

            const historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = '';
            
            // Loop backwards from index down to 0 to achieve "bottom to top" stacking
            for (let i = index; i >= 0; i--) {
                const s = steps[i];
                const isLatest = (i === index);
                
                const row = document.createElement('div');
                row.className = `flex flex-col sm:flex-row items-start sm:items-center gap-3 w-full p-3 rounded-lg transition-all ${isLatest ? 'bg-slate-800 border-2 border-teal-500 shadow-[0_0_15px_rgba(20,184,166,0.2)] z-10' : 'bg-slate-800/40 border-2 border-transparent opacity-70 z-0'}`;
                
                const infoPanel = document.createElement('div');
                infoPanel.className = 'flex flex-col gap-1 w-full sm:w-48 shrink-0';
                
                const badge = document.createElement('div');
                badge.className = `text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded w-max ${isLatest ? 'bg-teal-600 text-white' : 'bg-slate-700 text-slate-400'}`;
                badge.innerText = `STEP ${i+1}`;
                
                const msg = document.createElement('div');
                msg.className = `text-xs font-mono ${isLatest ? 'text-teal-300' : 'text-slate-500'}`;
                msg.innerText = s.msg;
                
                infoPanel.appendChild(badge);
                infoPanel.appendChild(msg);
                row.appendChild(infoPanel);

                const cardContainerWrap = document.createElement('div');
                cardContainerWrap.className = 'w-full flex flex-col items-center';

                // Add queue hints for the latest row to help visualization
                if (isLatest && s.list.length > 1) {
                    const queueHints = document.createElement('div');
                    queueHints.className = 'flex justify-between w-full px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 opacity-60';
                    queueHints.innerHTML = `<span>← Front (AddFirst)</span><span>Back (RemoveLast) →</span>`;
                    cardContainerWrap.appendChild(queueHints);
                }

                const cardContainer = document.createElement('div');
                cardContainer.className = 'flex gap-2 overflow-x-visible light-scroll custom-scroll w-full pb-1 pt-2 px-2';
                
                s.list.forEach((val, listIdx) => {
                    const card = document.createElement('div');
                    card.className = 'playing-card mini-card card-transition relative';
                    card.innerText = val;
                    
                    if ((s.phase === 'INSERT' || s.phase === 'INIT') && val === s.inserted && listIdx === 0) {
                        card.classList.add('border-teal-400', 'bg-teal-50', 'text-teal-800', 'z-20');
                        if (isLatest) card.classList.add('animate-drop-source', 'shadow-[0_4px_15px_rgba(20,184,166,0.6)]');
                    } else if (s.phase === 'ROTATE' && val === s.rotated && listIdx === 0) {
                        card.classList.add('border-amber-400', 'bg-amber-50', 'text-amber-800', 'z-10');
                        if (isLatest) card.classList.add('animate-swoop-right', 'shadow-[0_4px_15px_rgba(245,158,11,0.6)]');
                    } else {
                        card.classList.add('bg-white', 'text-slate-700', 'border-slate-300');
                        if (isLatest) card.classList.add('animate-shift');
                    }
                    
                    cardContainer.appendChild(card);
                });
                
                cardContainerWrap.appendChild(cardContainer);
                row.appendChild(cardContainerWrap);
                historyContainer.appendChild(row);
            }

            // Auto-scroll to top of history container
            historyContainer.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Playback Controls ---
        function goToStep(index) {
            currentStepIndex = parseInt(index);
            renderStep(currentStepIndex);
        }

        function nextStep() {
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                renderStep(currentStepIndex);
            } else if (isPlaying) {
                togglePlay();
            }
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                renderStep(currentStepIndex);
            }
        }

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                clearInterval(playInterval);
                isPlaying = false;
                btn.innerText = "PLAY";
                btn.classList.replace('bg-rose-600', 'bg-teal-700');
                btn.classList.replace('hover:bg-rose-700', 'hover:bg-teal-800');
            } else {
                if (currentStepIndex >= steps.length - 1) currentStepIndex = 0;
                isPlaying = true;
                btn.innerText = "PAUSE";
                btn.classList.replace('bg-teal-700', 'bg-rose-600');
                btn.classList.replace('hover:bg-teal-800', 'hover:bg-rose-700');
                
                const speed = document.getElementById('speedSlider').value;
                playInterval = setInterval(nextStep, speed);
            }
        }

        document.getElementById('speedSlider').addEventListener('input', function() {
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = setInterval(nextStep, this.value);
            }
        });

        // Setup Resize & Keyboard
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                } else if (e.code === 'ArrowRight') {
                    e.preventDefault();
                    if(isPlaying) togglePlay();
                    nextStep();
                } else if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    if(isPlaying) togglePlay();
                    prevStep();
                }
            });
        }

        function initResizer() {
            const resizer = document.getElementById('dragResizer');
            const leftPane = document.getElementById('leftPane');
            const mainContainer = document.getElementById('mainContainer');
            
            let isResizing = false;

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none'; 
                
                const overlay = document.createElement('div');
                overlay.id = 'dragOverlay';
                overlay.className = 'fixed inset-0 z-[9999]';
                document.body.appendChild(overlay);
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                const containerRect = mainContainer.getBoundingClientRect();
                const leftRect = leftPane.getBoundingClientRect();
                let newLeftWidth = e.clientX - leftRect.left;
                
                const minWidth = 350; 
                const maxWidth = containerRect.width - 350; 
                
                if (newLeftWidth < minWidth) newLeftWidth = minWidth;
                if (newLeftWidth > maxWidth) newLeftWidth = maxWidth;

                leftPane.style.width = `${newLeftWidth}px`;
                leftPane.style.flex = 'none';
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    
                    const overlay = document.getElementById('dragOverlay');
                    if (overlay) overlay.remove();
                }
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth < 1024) {
                    leftPane.style.width = '';
                    leftPane.style.flex = '';
                }
            });
        }

        // Bootstrap on load
        window.onload = () => {
            renderCodeView(currentCodeText);
            loadSimulation();
            initResizer();
            initKeyboardShortcuts();
        };
    </script>
</body>
</html>
