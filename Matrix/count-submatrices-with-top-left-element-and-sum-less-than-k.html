<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Visualizer: Submatrix Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell-transition {
            transition: all 0.3s ease-in-out;
        }
        /* Custom scrollbar for the code block */
        .code-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .code-scroll::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        .code-scroll::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 sm:px-8 shadow-md">
        <div class="w-full flex items-center justify-between">
            <h1 class="text-2xl font-bold">Submatrix Counter Visualization</h1>
            <div class="text-sm bg-indigo-700 px-3 py-1 rounded-full">Interactive Debugger</div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="mainContainer" class="flex-grow p-4 sm:p-8 w-full flex flex-col lg:flex-row gap-4 relative">
        
        <!-- Left Column: Controls & Grid -->
        <div id="leftPane" class="w-full lg:w-[60%] min-w-[300px] flex flex-col gap-4">
            
            <!-- Setup Panel -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-semibold mb-3">1. Configure Inputs</h2>
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-grow">
                        <label class="block text-sm font-medium text-slate-600 mb-1">Grid (JSON format)</label>
                        <input type="text" id="gridInput" value="[[1,2,3],[4,5,6],[7,8,9]]" 
                               class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none font-mono text-sm">
                    </div>
                    <div class="w-32">
                        <label class="block text-sm font-medium text-slate-600 mb-1">Target k</label>
                        <input type="number" id="kInput" value="15" 
                               class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div class="flex items-end">
                        <button id="loadBtn" onclick="loadSimulation()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                            Load Run
                        </button>
                    </div>
                </div>
                <div id="errorMsg" class="text-rose-600 bg-rose-50 border border-rose-200 p-3 rounded-lg text-sm mt-4 hidden font-mono"></div>
            </div>

            <!-- Visualization Panel -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-semibold">2. Live Memory State</h2>
                    <div class="flex gap-4 items-center">
                        <div class="bg-slate-100 px-4 py-2 rounded-lg border border-slate-200">
                            <span class="text-sm text-slate-500 font-medium">Target k:</span>
                            <span id="displayK" class="font-bold text-lg ml-1 text-indigo-700">-</span>
                        </div>
                        <div class="bg-slate-100 px-4 py-2 rounded-lg border border-slate-200">
                            <span class="text-sm text-slate-500 font-medium">Count:</span>
                            <span id="displayCount" class="font-bold text-lg ml-1 text-green-600">0</span>
                        </div>
                    </div>
                </div>

                <!-- Grid Rendering Area -->
                <div class="flex-grow flex items-center justify-center min-h-[300px] bg-slate-50 rounded-xl border border-slate-200 p-4">
                    <div id="gridContainer" class="grid gap-2">
                        <!-- Cells injected via JS -->
                    </div>
                </div>

                <!-- Legend -->
                <div class="flex gap-4 justify-center mt-6 text-sm flex-wrap">
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-yellow-200 border border-yellow-500 rounded"></div> Active/Writing</div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-emerald-200 border border-emerald-500 rounded"></div> Adding (+)</div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-rose-200 border border-rose-500 rounded"></div> Subtracting (-)</div>
                    <div class="flex items-center gap-2"><div class="w-4 h-4 bg-indigo-200 border border-indigo-500 rounded"></div> Condition Met</div>
                </div>
            </div>

            <!-- Playback Controls -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-2">
                        <button onclick="prevStep()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg transition text-slate-700" title="Previous Step">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="playBtn" onclick="togglePlay()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition font-medium w-28 text-center shadow-sm">
                            Play
                        </button>
                        <button onclick="nextStep()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg transition text-slate-700" title="Next Step">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                    
                    <div class="flex-grow flex items-center gap-4 px-4 w-full">
                        <span class="text-sm text-slate-500 whitespace-nowrap">Step <span id="stepCounter">0/0</span></span>
                        <input type="range" id="stepSlider" min="0" max="0" value="0" class="w-full accent-indigo-600" oninput="goToStep(this.value)">
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="text-sm text-slate-500">Speed:</span>
                        <input type="range" id="speedSlider" min="100" max="2000" value="800" dir="rtl" class="w-24 accent-slate-400">
                    </div>
                </div>
                <div class="mt-4 p-3 bg-indigo-50 text-indigo-800 rounded-lg text-sm border border-indigo-100 font-medium" id="stepMessage">
                    Click 'Load Run' and then 'Play' to start the visualization.
                </div>
            </div>

        </div>

        <!-- Draggable Resizer (Desktop Only) -->
        <div id="dragResizer" class="hidden lg:flex w-4 cursor-col-resize items-center justify-center -mx-2 z-20 group select-none">
            <div class="h-24 w-1.5 bg-slate-300 group-hover:bg-indigo-500 rounded-full transition-colors"></div>
        </div>

        <!-- Right Column: Code Viewer / Editor -->
        <div id="rightPane" class="w-full lg:flex-1 min-w-[300px] bg-slate-900 rounded-xl shadow-sm border border-slate-800 flex flex-col overflow-hidden relative">
            <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center z-10">
                <h2 class="text-slate-200 font-semibold text-sm font-mono">Algorithm Source Code</h2>
                <div class="flex items-center gap-4">
                    <button id="editCodeBtn" onclick="toggleEditMode()" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold rounded transition-colors shadow-sm">
                        Edit Code
                    </button>
                    <div class="flex gap-1.5 hidden sm:flex">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    </div>
                </div>
            </div>
            <div class="relative flex-grow h-[600px] lg:h-auto">
                <div class="absolute inset-0 overflow-y-auto code-scroll p-4" id="codeContainer">
                    <pre class="font-mono text-sm leading-relaxed text-slate-300 w-full" id="codeBlock"></pre>
                </div>
                <!-- Hidden by default, shown when editing -->
                <textarea id="codeEditor" class="hidden absolute inset-0 w-full h-full bg-slate-950 text-emerald-400 font-mono text-sm leading-relaxed focus:outline-none resize-none border-none p-4 code-scroll" spellcheck="false" style="tab-size: 4;"></textarea>
            </div>
        </div>

    </main>

    <script>
        // --- Editable Code State ---
        let currentCodeText = `state.count = 0;
log("Check first cell");
if (grid[0][0] <= k) {
    state.count++;
}

for (let i = 1; i < grid[0].length; i++) {
    log("Row 0 Loop: i=" + i);
    grid[0][i] += grid[0][i-1];
    if (grid[0][i] <= k) state.count++;
}

for (let i = 1; i < grid.length; i++) {
    log("Col 0 Loop: i=" + i);
    grid[i][0] += grid[i-1][0];
    if (grid[i][0] <= k) state.count++;
}

for (let i = 1; i < grid.length; i++) {
    for (let j = 1; j < grid[0].length; j++) {
        log("Main Loop: i=" + i + ", j=" + j);
        grid[i][j] += grid[i-1][j] + grid[i][j-1] - grid[i-1][j-1];
        if (grid[i][j] <= k) state.count++;
    }
}
return state.count;`;

        let isEditMode = false;

        // Handle Tab key in Textarea
        document.getElementById('codeEditor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        function toggleEditMode() {
            const btn = document.getElementById('editCodeBtn');
            const pre = document.getElementById('codeContainer');
            const editor = document.getElementById('codeEditor');
            const loadBtn = document.getElementById('loadBtn');

            if (!isEditMode) {
                // Enter Edit Mode
                isEditMode = true;
                btn.innerText = "Save & Run";
                btn.classList.replace('bg-slate-700', 'bg-emerald-600');
                btn.classList.replace('hover:bg-slate-600', 'hover:bg-emerald-500');
                
                editor.value = currentCodeText;
                pre.classList.add('hidden');
                editor.classList.remove('hidden');
                
                // Disable load execution while editing
                loadBtn.disabled = true;
                loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                // Pause playback
                if(isPlaying) togglePlay();

            } else {
                // Exit Edit Mode & Run
                isEditMode = false;
                btn.innerText = "Edit Code";
                btn.classList.replace('bg-emerald-600', 'bg-slate-700');
                btn.classList.replace('hover:bg-emerald-500', 'hover:bg-slate-600');
                
                currentCodeText = editor.value;
                editor.classList.add('hidden');
                pre.classList.remove('hidden');
                
                renderCodeView(currentCodeText);
                
                loadBtn.disabled = false;
                loadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                
                loadSimulation();
            }
        }

        function renderCodeView(code) {
            const codeLines = code.split('\n');
            const codeBlock = document.getElementById('codeBlock');
            codeBlock.innerHTML = codeLines.map((line, index) => {
                const lineNum = index + 1;
                return `<div id="line-${lineNum}" class="px-2 py-0.5 border-l-4 border-transparent flex items-center relative">
                    <span id="caret-${lineNum}" class="absolute left-0 -ml-1 text-yellow-400 opacity-0 transition-opacity duration-200 text-xs">▶</span>
                    <span class="text-slate-600 w-8 inline-block select-none ml-3 text-right pr-2">${lineNum}</span>
                    <span class="whitespace-pre">${line.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>
                </div>`;
            }).join('');
        }

        // --- Core Application State ---
        let steps = [];
        let currentStepIndex = 0;
        let isPlaying = false;
        let playInterval;

        const copyGrid = (g) => g.map(row => [...row]);

        // Dynamic Engine: Uses Proxies to intercept array and state changes in the user's custom code
        function runCustomCode(code, initialGrid, kValue) {
            let generatedSteps = [];
            let currentGrid = copyGrid(initialGrid);
            let stateObj = { count: 0 };
            let recentReads = [];

            // Hack to find the execution line number from the stack trace
            function getLineNumber() {
                try { throw new Error(); } catch (e) {
                    const match = (e.stack || '').match(/(?:<anonymous>|eval|Function)[^:]*:(\d+):\d+/i);
                    if (match) {
                        let line = parseInt(match[1]);
                        return line > 2 ? line - 2 : line; // Adjust for Function wrapper lines
                    }
                    return -1;
                }
            }

            function recordSnapshot(msg, active = [], read = [], isMatch = false) {
                generatedSteps.push({
                    grid: copyGrid(currentGrid),
                    count: stateObj.count,
                    message: msg,
                    activeCells: active,
                    readCells: read,
                    isMatch: isMatch,
                    line: getLineNumber()
                });
            }

            // Let users log custom messages to the UI timeline
            function logFunc(msg) {
                recordSnapshot(msg, [], recentReads.map(read => ({ ...read, type: 'add' })));
                recentReads = [];
            }

            // Intercept array accesses to highlight UI reading and writing automatically
            const proxiedGrid = currentGrid.map((row, r) => new Proxy(row, {
                get(target, prop) {
                    if (typeof prop === 'string' && !isNaN(prop)) {
                        recentReads.push({r, c: parseInt(prop)});
                    }
                    return target[prop];
                },
                set(target, prop, value) {
                    if (typeof prop === 'string' && !isNaN(prop)) {
                        const c = parseInt(prop);
                        target[prop] = value;
                        
                        // Heuristic: the top-left cell relative to current write is the subtracted overlap
                        const classifiedReads = recentReads.map(read => {
                            if (read.r < r && read.c < c) {
                                return { ...read, type: 'sub' };
                            }
                            return { ...read, type: 'add' };
                        });

                        recordSnapshot(`Updated grid[${r}][${c}] to ${value}`, [{r, c}], classifiedReads);
                        recentReads = []; 
                    }
                    return true;
                }
            }));

            // Intercept count tracking
            const proxyState = new Proxy(stateObj, {
                set(target, prop, value) {
                    target[prop] = value;
                    if (prop === 'count') {
                        // Highlight the last read cell as the one that matched the condition
                        const matchedCell = recentReads.length > 0 ? [recentReads[recentReads.length - 1]] : [];
                        recordSnapshot(`Condition met! Count incremented to ${value}`, matchedCell, recentReads.map(r => ({ ...r, type: 'add' })), true);
                        recentReads = [];
                    }
                    return true;
                }
            });

            try {
                // Bootstrap Engine
                generatedSteps.push({
                    grid: copyGrid(currentGrid), count: 0,
                    message: "Simulation Started", activeCells: [], readCells: [], isMatch: false, line: 1
                });

                // Execute the User's text as a JavaScript function
                const dynamicFunction = new Function('grid', 'state', 'k', 'log', code);
                dynamicFunction(proxiedGrid, proxyState, kValue, logFunc);

                generatedSteps.push({
                    grid: copyGrid(currentGrid), count: stateObj.count,
                    message: `Execution complete. Total count: ${stateObj.count}`,
                    activeCells: [], readCells: [], isMatch: false, line: code.split('\n').length
                });

                return { steps: generatedSteps, error: null };
            } catch (err) {
                return { steps: generatedSteps, error: err.message };
            }
        }

        function loadSimulation() {
            if (isPlaying) togglePlay();

            const gridStr = document.getElementById('gridInput').value;
            const kStr = document.getElementById('kInput').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const initialGrid = JSON.parse(gridStr);
                const kValue = parseInt(kStr);

                if (!Array.isArray(initialGrid) || !Array.isArray(initialGrid[0])) {
                    throw new Error("Must be a 2D array like [[1,2],[3,4]]");
                }
                
                // Run the User's code through the engine
                const result = runCustomCode(currentCodeText, initialGrid, kValue);
                
                if (result.error) {
                    errorMsg.innerText = "Error in your code:\n" + result.error;
                    errorMsg.classList.remove('hidden');
                    steps = [];
                    return;
                }

                errorMsg.classList.add('hidden');
                steps = result.steps;
                
                // Setup UI bounds
                const slider = document.getElementById('stepSlider');
                slider.max = steps.length - 1;
                slider.value = 0;
                
                document.getElementById('displayK').innerText = kValue;
                
                // Reset State
                currentStepIndex = 0;
                renderStep(0);

                // Setup grid CSS layout
                const gridContainer = document.getElementById('gridContainer');
                gridContainer.style.gridTemplateColumns = `repeat(${initialGrid[0].length}, minmax(0, 1fr))`;

            } catch (e) {
                errorMsg.innerText = "Error parsing grid input. Ensure valid JSON format.";
                errorMsg.classList.remove('hidden');
            }
        }

        // --- Rendering Engine ---
        function renderStep(index) {
            if (steps.length === 0) return;
            const step = steps[index];
            
            // Update Text UI
            document.getElementById('displayCount').innerText = step.count;
            document.getElementById('stepCounter').innerText = `${index + 1}/${steps.length}`;
            document.getElementById('stepSlider').value = index;
            document.getElementById('stepMessage').innerHTML = `<span class="font-bold">Action:</span> ${step.message}`;

            // Render Matrix Grid
            const gridContainer = document.getElementById('gridContainer');
            gridContainer.innerHTML = ''; 
            
            const rows = step.grid.length;
            const cols = step.grid[0].length;
            
            const isActive = (r, c) => step.activeCells && step.activeCells.some(cell => cell.r === r && cell.c === c);
            const getReadCell = (r, c) => step.readCells && step.readCells.find(cell => cell.r === r && cell.c === c);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const val = step.grid[r][c];
                    const active = isActive(r, c);
                    const readObj = getReadCell(r, c);
                    
                    let bgClass = "bg-white";
                    let borderClass = "border-slate-200";
                    let textClass = "text-slate-700";
                    let zIndex = "z-0";
                    let scaleClass = "scale-100";

                    if (active) {
                        bgClass = step.isMatch ? "bg-indigo-100" : "bg-yellow-100";
                        borderClass = step.isMatch ? "border-indigo-500 shadow-md" : "border-yellow-500 shadow-md";
                        textClass = step.isMatch ? "text-indigo-800 font-bold" : "text-yellow-800 font-bold";
                        zIndex = "z-10";
                        scaleClass = "scale-105";
                    } else if (readObj) {
                        if (readObj.type === 'sub') {
                            bgClass = "bg-rose-100";
                            borderClass = "border-rose-500 shadow-sm";
                            textClass = "text-rose-800 font-bold";
                        } else {
                            bgClass = "bg-emerald-100";
                            borderClass = "border-emerald-500 shadow-sm";
                            textClass = "text-emerald-800 font-bold";
                        }
                    }

                    const cellDiv = document.createElement('div');
                    cellDiv.className = `cell-transition flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 text-lg rounded-xl border-2 ${bgClass} ${borderClass} ${textClass} ${zIndex} ${scaleClass}`;
                    cellDiv.innerHTML = `<div class="absolute top-1 left-1.5 text-[10px] opacity-40 leading-none">(${r},${c})</div><div class="text-xl">${val}</div>`;
                    gridContainer.appendChild(cellDiv);
                }
            }

            // Render Dynamic Code Caret Tracker
            document.querySelectorAll('#codeBlock > div').forEach(div => {
                div.classList.remove('bg-indigo-900', 'border-yellow-400', 'bg-opacity-50');
                div.classList.add('border-transparent');
            });
            document.querySelectorAll('[id^="caret-"]').forEach(caret => {
                caret.classList.remove('opacity-100');
                caret.classList.add('opacity-0');
            });

            // Fallback for execution environments that block error stack tracing
            if (step.line > 0) {
                const activeLineEl = document.getElementById(`line-${step.line}`);
                const activeCaretEl = document.getElementById(`caret-${step.line}`);
                if (activeLineEl) {
                    activeLineEl.classList.remove('border-transparent');
                    activeLineEl.classList.add('bg-indigo-900', 'border-yellow-400', 'bg-opacity-50');
                    if (activeCaretEl) activeCaretEl.classList.replace('opacity-0', 'opacity-100');
                    activeLineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // --- Playback Controls ---
        function goToStep(index) {
            currentStepIndex = parseInt(index);
            renderStep(currentStepIndex);
        }

        function nextStep() {
            if (currentStepIndex < steps.length - 1) {
                currentStepIndex++;
                renderStep(currentStepIndex);
            } else if (isPlaying) togglePlay();
        }

        function prevStep() {
            if (currentStepIndex > 0) {
                currentStepIndex--;
                renderStep(currentStepIndex);
            }
        }

        function togglePlay() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                clearInterval(playInterval);
                isPlaying = false;
                btn.innerText = "Play";
                btn.classList.replace('bg-rose-600', 'bg-indigo-600');
                btn.classList.replace('hover:bg-rose-700', 'hover:bg-indigo-700');
            } else {
                if (currentStepIndex >= steps.length - 1) currentStepIndex = 0;
                isPlaying = true;
                btn.innerText = "Pause";
                btn.classList.replace('bg-indigo-600', 'bg-rose-600');
                btn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-700');
                
                const speed = document.getElementById('speedSlider').value;
                playInterval = setInterval(nextStep, speed);
            }
        }

        document.getElementById('speedSlider').addEventListener('input', function() {
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = setInterval(nextStep, this.value);
            }
        });

        // Bootstrap on load
        window.onload = () => {
            renderCodeView(currentCodeText);
            loadSimulation();
            initResizer();
        };

        // --- Drag to Resize Logic ---
        function initResizer() {
            const resizer = document.getElementById('dragResizer');
            const leftPane = document.getElementById('leftPane');
            const mainContainer = document.getElementById('mainContainer');
            
            let isResizing = false;

            resizer.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none'; // Prevent text selection
                
                // Add a transparent overlay to prevent iframe/editor from stealing mousemove events
                const overlay = document.createElement('div');
                overlay.id = 'dragOverlay';
                overlay.style.position = 'fixed';
                overlay.style.inset = '0';
                overlay.style.zIndex = '9999';
                document.body.appendChild(overlay);
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                
                const containerRect = mainContainer.getBoundingClientRect();
                const leftRect = leftPane.getBoundingClientRect();
                
                let newLeftWidth = e.clientX - leftRect.left;
                
                const minWidth = 350; // Min width for left panel
                const maxWidth = containerRect.width - 350; // Ensure right panel has at least 350px width
                
                if (newLeftWidth < minWidth) newLeftWidth = minWidth;
                if (newLeftWidth > maxWidth) newLeftWidth = maxWidth;

                leftPane.style.width = `${newLeftWidth}px`;
                leftPane.style.flex = 'none';
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    
                    const overlay = document.getElementById('dragOverlay');
                    if (overlay) overlay.remove();
                }
            });

            // Reset inline styles on mobile view fallback
            window.addEventListener('resize', () => {
                if (window.innerWidth < 1024) {
                    leftPane.style.width = '';
                    leftPane.style.flex = '';
                }
            });
        }
    </script>
</body>
</html>
