<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Problem Explorer</title>
    <meta name="description" content="Search and visualize curated data structure and algorithm problems. DSA Explorer helps you learn algorithms with interactive visualizations linked to LeetCode.">
    <link rel="canonical" href="https://codefrydev.in/AnimateDatastructure/">
    <!-- Open Graph -->
    <meta property="og:title" content="DSA Problem Explorer | Visualize Data Structures &amp; Algorithms">
    <meta property="og:description" content="Search and visualize curated data structure and algorithm problems. Interactive DSA visualizations linked to LeetCode.">
    <meta property="og:url" content="https://codefrydev.in/AnimateDatastructure/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="DSA Explorer">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="DSA Problem Explorer | Visualize Data Structures &amp; Algorithms">
    <meta name="twitter:description" content="Search and visualize curated data structure and algorithm problems. Interactive DSA visualizations linked to LeetCode.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827; 
        }
        ::-webkit-scrollbar-thumb {
            background: #374151; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563; 
        }
        /* Table transition */
        tbody tr {
            transition: all 0.2s ease-in-out;
        }
        /* Screen reader only - visible when focused */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        /* Keyboard focus for sortable headers and status cells */
        th[data-sort-key]:focus-visible,
        [data-status-cell]:focus-visible {
            outline: 2px solid rgb(99 102 241);
            outline-offset: 2px;
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "DSA Problem Explorer",
        "description": "Search and visualize curated data structure and algorithm problems. Interactive visualizations linked to LeetCode.",
        "url": "https://codefrydev.in/AnimateDatastructure/"
    }
    </script>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen antialiased">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-indigo-500 focus:text-white focus:rounded-lg focus:outline-none focus:ring-2 focus:ring-white">Skip to main content</a>

    <!-- App shell -->
    <div class="w-full px-4 sm:px-6 lg:px-10 xl:px-20 py-6">
        <!-- Header -->
        <header class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between border-b border-gray-900 pb-5">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-500/15 rounded-xl text-indigo-400" aria-hidden="true">
                    <i data-lucide="code-2" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-semibold text-white tracking-tight">
                        DSA Explorer
                    </h1>
                    <p class="mt-1 text-sm text-gray-400">
                        Search and visualize curated data structure & algorithm problems.
                    </p>
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main id="main-content" class="mb-6" tabindex="-1">
        <!-- Controls Section (Search & Filter) -->
        <section class="mb-6" aria-label="Search and filter">
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-grow">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none" aria-hidden="true">
                    <i data-lucide="search" class="w-5 h-5 text-gray-500"></i>
                </div>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="block w-full pl-10 pr-3 py-2.5 border border-gray-800 rounded-xl leading-5 bg-gray-900/80 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors" 
                    placeholder="Search by problem name or topic..."
                    aria-label="Search problems by name or topic"
                >
            </div>
            
            <div class="relative min-w-[150px]">
                <select 
                    id="difficultyFilter" 
                    class="block w-full pl-3 pr-10 py-2.5 text-base border border-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-xl bg-gray-900/80 text-gray-100 appearance-none transition-colors"
                    aria-label="Filter by difficulty"
                >
                    <option value="All">All Difficulties</option>
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500" aria-hidden="true">
                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Data Table -->
        <div class="bg-gray-900/70 rounded-2xl border border-gray-900/80 overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="min-w-full table-fixed divide-y divide-gray-800" aria-label="List of DSA problems with status, topic, and difficulty">
                    <thead class="bg-gray-900/80">
                        <tr>
                            <th scope="col" class="w-16 px-4 py-3 text-left text-[0.7rem] font-semibold text-gray-400 uppercase tracking-[0.14em] select-none cursor-pointer focus:outline-none" data-sort-key="number" data-label="#" tabindex="0" role="button">
                                <span>#</span>
                            </th>
                            <th scope="col" class="w-12 px-4 py-3 text-left text-[0.7rem] font-semibold text-gray-400 uppercase tracking-[0.14em] select-none cursor-pointer focus:outline-none" data-sort-key="status" data-label="Status" tabindex="0" role="button">
                                <span>Status</span>
                            </th>
                            <th scope="col" class="w-2/5 px-4 py-3 text-left text-[0.7rem] font-semibold text-gray-400 uppercase tracking-[0.14em] select-none cursor-pointer focus:outline-none" data-sort-key="name" data-label="Problem" tabindex="0" role="button">
                                <span>Problem</span>
                            </th>
                            <th scope="col" class="w-1/4 px-4 py-3 text-left text-[0.7rem] font-semibold text-gray-400 uppercase tracking-[0.14em] select-none cursor-pointer focus:outline-none" data-sort-key="topic" data-label="Topic" tabindex="0" role="button">
                                <span>Topic</span>
                            </th>
                            <th scope="col" class="w-28 px-4 py-3 text-left text-[0.7rem] font-semibold text-gray-400 uppercase tracking-[0.14em] select-none cursor-pointer focus:outline-none" data-sort-key="difficulty" data-label="Difficulty" tabindex="0" role="button">
                                <span>Difficulty</span>
                            </th>
                            <th scope="col" class="w-56 px-4 py-3 text-right text-[0.7rem] font-semibold text-gray-400 uppercase tracking-[0.14em]">
                                Resources
                            </th>
                        </tr>
                    </thead>
                    <tbody id="problemList" class="divide-y divide-gray-850 bg-gray-900">
                        <!-- Rows will be dynamically injected here via JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-center" role="status" aria-live="polite">
                <div class="p-3 bg-gray-800 rounded-full text-gray-500 mb-4">
                    <i data-lucide="search-x" class="w-8 h-8"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-200">No problems found</h3>
                <p class="mt-1 text-sm text-gray-500">Refine your search query or update the filters.</p>
            </div>
        </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script>
        // Backing data - populated from problems.json
        let dsaProblems = [];

        // DOM Elements
        const problemListEl = document.getElementById('problemList');
        const searchInput = document.getElementById('searchInput');
        const difficultyFilter = document.getElementById('difficultyFilter');
        const emptyState = document.getElementById('emptyState');
        let lastErrorMessage = '';

        // Sorting state
        const sortConfig = {
            key: 'number',    // 'number' | 'status' | 'name' | 'topic' | 'difficulty'
            direction: 'asc', // 'asc' | 'desc'
        };

        const STORAGE_KEY = 'dsa-explorer-progress';

        function getProgressFromStorage() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return {};
                const parsed = JSON.parse(raw);
                return typeof parsed === 'object' && parsed !== null ? parsed : {};
            } catch {
                return {};
            }
        }

        function saveProgressToStorage() {
            const progress = {};
            dsaProblems.forEach((p) => {
                if (p.solved || p.inProgress) {
                    progress[p.id] = { solved: !!p.solved, inProgress: !!p.inProgress };
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        }

        function cycleProblemStatus(problemId) {
            const problem = dsaProblems.find((p) => p.id === problemId);
            if (!problem) return;
            if (problem.solved) {
                problem.solved = false;
                problem.inProgress = false;
            } else if (problem.inProgress) {
                problem.solved = true;
                problem.inProgress = false;
            } else {
                problem.inProgress = true;
            }
            saveProgressToStorage();
            filterData();
        }

        // Helper function for difficulty badge styling
        function getDifficultyClasses(difficulty) {
            switch(difficulty) {
                case 'Easy':
                    return 'bg-emerald-500/10 text-emerald-300 border-emerald-500/20';
                case 'Medium':
                    return 'bg-amber-500/10 text-amber-300 border-amber-500/20';
                case 'Hard':
                    return 'bg-rose-500/10 text-rose-300 border-rose-500/20';
                default:
                    return 'bg-gray-500/10 text-gray-300 border-gray-500/20';
            }
        }

        // Render function
        function renderProblems(problems) {
            problemListEl.innerHTML = '';

            if (problems.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                const titleEl = emptyState.querySelector('h3');
                const descEl = emptyState.querySelector('p');
                if (lastErrorMessage) {
                    if (titleEl) titleEl.textContent = 'Unable to load problems';
                    if (descEl) descEl.textContent = lastErrorMessage;
                } else {
                    if (titleEl) titleEl.textContent = 'No problems found';
                    if (descEl) descEl.textContent = 'Try adjusting your search or filters.';
                }
                return;
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
            }

            problems.forEach((problem) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-850/70 group';

                // Status: solved > in progress > not started
                let statusIcon, statusTitle;
                if (problem.solved) {
                    statusIcon = '<i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>';
                    statusTitle = 'Finished (click to clear)';
                } else if (problem.inProgress) {
                    statusIcon = '<i data-lucide="clock" class="w-4 h-4 text-amber-400"></i>';
                    statusTitle = 'In progress (click to set finished)';
                } else {
                    statusIcon = '<i data-lucide="circle" class="w-4 h-4 text-gray-600 group-hover:text-gray-400 transition-colors"></i>';
                    statusTitle = 'Not started (click to set in progress)';
                }

                const diffClasses = getDifficultyClasses(problem.difficulty);

                const numberCell = typeof problem.number === 'number'
                    ? `<td class="px-4 py-3 align-middle text-xs text-gray-400 tabular-nums">${problem.number}</td>`
                    : `<td class="px-4 py-3 align-middle text-xs text-gray-600">—</td>`;

                const problemIdEscaped = (problem.id || '').replace(/"/g, '&quot;');

                const nameEscaped = (problem.name || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
                tr.innerHTML = `
                    ${numberCell}
                    <td class="px-4 py-3 align-middle cursor-pointer select-none focus:outline-none" data-status-cell data-problem-id="${problemIdEscaped}" title="${statusTitle}" tabindex="0" role="button" aria-label="${statusTitle}">
                        <div class="flex items-center justify-center w-6" aria-hidden="true">
                            ${statusIcon}
                        </div>
                    </td>
                    <td class="px-4 py-3 align-top">
                        <div class="text-sm font-medium text-gray-200 group-hover:text-indigo-300 transition-colors cursor-pointer break-words">
                            ${problem.name}
                        </div>
                    </td>
                    <td class="px-4 py-3 align-top">
                        <div class="text-sm text-gray-400 break-words">${problem.topic}</div>
                    </td>
                    <td class="px-4 py-3 align-middle">
                        <span class="px-2.5 py-1 inline-flex text-[0.7rem] leading-5 font-medium rounded-full border ${diffClasses}">
                            ${problem.difficulty}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-right text-sm font-medium">
                        <div class="flex items-center justify-end gap-2">
                            <a href="${problem.animationUrl}" class="inline-flex items-center gap-1 rounded-lg px-3 py-1.5 text-xs font-medium text-indigo-300 bg-gray-800/70 hover:bg-gray-800 hover:text-indigo-200 border border-gray-700/80 hover:border-indigo-500/50 transition-colors" title="View animation for this problem" aria-label="Visualize: ${nameEscaped}">
                                <i data-lucide="play-circle" class="w-4 h-4" aria-hidden="true"></i>
                                <span>Visualize</span>
                            </a>
                            <a href="${problem.leetcodeUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 rounded-lg px-3 py-1.5 text-xs font-medium text-amber-300 bg-gray-800/70 hover:bg-gray-800 hover:text-amber-200 border border-gray-700/80 hover:border-amber-500/50 transition-colors" title="Open problem on LeetCode in a new tab" aria-label="Open on LeetCode: ${nameEscaped}">
                                <i data-lucide="external-link" class="w-4 h-4" aria-hidden="true"></i>
                                <span>Solve</span>
                            </a>
                        </div>
                    </td>
                `;
                problemListEl.appendChild(tr);
            });

            // Re-initialize Lucide icons for dynamically added elements
            lucide.createIcons();
        }

        // Load data from problems.json
        async function loadProblems() {
            try {
                lastErrorMessage = '';
                const response = await fetch('problems.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} while loading problems.json`);
                }

                const data = await response.json();

                const categories = Array.isArray(data.Categories) ? data.Categories : [];

                let autoNumber = 1;

                dsaProblems = categories.flatMap(category => {
                    const catName = category.Name || 'Uncategorized';
                    const problems = Array.isArray(category.Problems) ? category.Problems : [];

                    return problems.map(p => {
                        const topics = Array.isArray(p.Topics) ? p.Topics : [];
                        const topicLabel = topics.length > 0
                            ? topics.join(', ')
                            : catName;

                        const difficulty = p.Difficulty || 'Unknown';
                        const explicitNumber = typeof p.Number === 'number'
                            ? p.Number
                            : (typeof p.ProblemNumber === 'number' ? p.ProblemNumber : null);
                        const number = explicitNumber ?? autoNumber++;

                        return {
                            id: p.Path || `unknown-${autoNumber}`,
                            number,
                            name: p.Title || 'Untitled Problem',
                            topic: topicLabel,
                            difficulty,
                            leetcodeUrl: p.ProblemUri || '#',
                            animationUrl: p.Path || '#',
                            solved: false,
                            inProgress: false
                        };
                    });
                });

                const saved = getProgressFromStorage();
                dsaProblems.forEach((problem) => {
                    const entry = saved[problem.id];
                    if (entry) {
                        if (typeof entry.solved === 'boolean') problem.solved = entry.solved;
                        if (typeof entry.inProgress === 'boolean') problem.inProgress = entry.inProgress;
                    }
                });

                filterData();
            } catch (err) {
                console.error('Failed to load problems.json', err);
                lastErrorMessage = 'Could not load problems.json. Please try again later.';
                dsaProblems = [];
                renderProblems([]);
            }
        }

        // Apply sorting based on current sortConfig
        function sortProblems(problems) {
            const { key, direction } = sortConfig;
            const sorted = [...problems].sort((a, b) => {
                let valA;
                let valB;

                switch (key) {
                    case 'number':
                        valA = typeof a.number === 'number' ? a.number : Number.MAX_SAFE_INTEGER;
                        valB = typeof b.number === 'number' ? b.number : Number.MAX_SAFE_INTEGER;
                        break;
                    case 'status':
                        // Not started (0), in progress (1), solved (2); ascending = not started first
                        valA = a.solved ? 2 : (a.inProgress ? 1 : 0);
                        valB = b.solved ? 2 : (b.inProgress ? 1 : 0);
                        break;
                    case 'topic':
                        valA = (a.topic || '').toLowerCase();
                        valB = (b.topic || '').toLowerCase();
                        break;
                    case 'difficulty': {
                        const order = { 'Easy': 1, 'Medium': 2, 'Hard': 3 };
                        valA = order[a.difficulty] || 99;
                        valB = order[b.difficulty] || 99;
                        break;
                    }
                    case 'name':
                    default:
                        valA = (a.name || '').toLowerCase();
                        valB = (b.name || '').toLowerCase();
                        break;
                }

                if (valA < valB) return direction === 'asc' ? -1 : 1;
                if (valA > valB) return direction === 'asc' ? 1 : -1;
                return 0;
            });

            return sorted;
        }

        // Update header labels / aria attributes to reflect active sort
        function updateSortIndicators() {
            const headerCells = document.querySelectorAll('th[data-sort-key]');
            headerCells.forEach((th) => {
                const key = th.getAttribute('data-sort-key');
                const baseLabel = th.getAttribute('data-label') || '';
                const labelSpan = th.querySelector('span');

                if (!labelSpan) return;

                if (sortConfig.key === key) {
                    const arrow = sortConfig.direction === 'asc' ? ' ↑' : ' ↓';
                    labelSpan.textContent = baseLabel + arrow;
                    th.setAttribute(
                        'aria-sort',
                        sortConfig.direction === 'asc' ? 'ascending' : 'descending'
                    );
                    th.classList.remove('text-gray-400');
                    th.classList.add('text-gray-200');
                } else {
                    labelSpan.textContent = baseLabel;
                    th.setAttribute('aria-sort', 'none');
                    th.classList.remove('text-gray-200');
                    th.classList.add('text-gray-400');
                }
            });
        }

        // Filtering logic
        function filterData() {
            const searchTerm = searchInput.value.toLowerCase();
            const difficulty = difficultyFilter.value;

            const filtered = dsaProblems.filter(problem => {
                const matchesSearch = problem.name.toLowerCase().includes(searchTerm) || 
                                      problem.topic.toLowerCase().includes(searchTerm);
                const matchesDifficulty = difficulty === 'All' || problem.difficulty === difficulty;
                
                return matchesSearch && matchesDifficulty;
            });

            const sorted = sortProblems(filtered);
            renderProblems(sorted);
        }

        function triggerSort(key) {
            if (!key) return;
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            updateSortIndicators();
            filterData();
        }

        // Initialize sortable table headers
        function initSortableHeaders() {
            const headerCells = document.querySelectorAll('th[data-sort-key]');
            headerCells.forEach((th) => {
                th.addEventListener('click', () => triggerSort(th.getAttribute('data-sort-key')));
                th.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        triggerSort(th.getAttribute('data-sort-key'));
                    }
                });
            });

            updateSortIndicators();
        }

        // Event Listeners
        searchInput.addEventListener('input', filterData);
        difficultyFilter.addEventListener('change', filterData);

        problemListEl.addEventListener('click', (e) => {
            const cell = e.target.closest('[data-status-cell]');
            if (!cell) return;
            const id = cell.getAttribute('data-problem-id');
            if (id) cycleProblemStatus(id);
        });
        problemListEl.addEventListener('keydown', (e) => {
            const cell = e.target.closest('[data-status-cell]');
            if (!cell) return;
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const id = cell.getAttribute('data-problem-id');
                if (id) cycleProblemStatus(id);
            }
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            loadProblems().then(() => {
                initSortableHeaders();
                lucide.createIcons(); // Initialize header icons
            });
        });
    </script>
</body>
</html>
